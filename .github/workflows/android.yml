name: Android CI/CD

on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        # Full history so app/build.gradle.kts can derive versionCode/versionName
        # from `git rev-list --count HEAD` and `git describe --tags`.
        fetch-depth: 0

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create placeholder local.properties
      run: |
        echo "server.url=https://example.com" > local.properties
        echo "api.token=placeholder" >> local.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Lint GitHub Actions workflows
      uses: rhysd/actionlint@v1

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Run Lint
      run: ./gradlew lintDebug --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Run Spotless Check
      run: ./gradlew spotlessCheck --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Upload Debug Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flux-edit-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        # Full history so app/build.gradle.kts can derive versionCode/versionName
        # from `git rev-list --count HEAD` and `git describe --tags`.
        fetch-depth: 0

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create placeholder local.properties
      run: |
        echo "server.url=https://example.com" > local.properties
        echo "api.token=placeholder" >> local.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Decode the release keystore + write keystore.properties on tag builds.
    # The repo signing block in app/build.gradle.kts will pick these up
    # automatically and produce a signed APK. Tag builds must be signed.
    - name: Require release signing secrets
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
      run: |
        missing=0
        for name in ANDROID_KEYSTORE_BASE64 KEYSTORE_STORE_PASSWORD KEYSTORE_KEY_ALIAS KEYSTORE_KEY_PASSWORD; do
          if [[ -z "${!name}" ]]; then
            echo "::error::$name is required for signed tag releases"
            missing=1
          fi
        done
        exit "$missing"

    - name: Decode release keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
        cat > "$GITHUB_WORKSPACE/keystore.properties" <<EOF
        storeFile=release.jks
        storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
        keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
        keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
        EOF

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Stage release APK for release upload
      run: |
        signed="app/build/outputs/apk/release/app-release.apk"
        if [[ ! -f "$signed" ]]; then
          echo "::error::Signed release APK not found at $signed"
          exit 1
        fi
        cp "$signed" "flux-edit-${{ github.ref_name }}.apk"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: flux-edit-${{ github.ref_name }}.apk
        name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        fail_on_unmatched_files: true
