name: Android CI/CD

on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create placeholder local.properties
      run: |
        echo "server.url=https://example.com" > local.properties
        echo "api.token=placeholder" >> local.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Build Unsigned Release APK
      run: ./gradlew assembleRelease --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Run Lint
      run: ./gradlew lintDebug --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Run Spotless Check
      run: ./gradlew spotlessCheck --stacktrace -Porg.gradle.java.installations.auto-download=false -Porg.gradle.java.installations.auto-detect=true

    - name: Upload Debug Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flux-edit-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
